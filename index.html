<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>褒め殺しカウンター</title>
    <!-- 紙吹雪を降らせるライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="combo-text" id="comboText"></div>
    <div id="counter">0 回 褒められた！</div>
    
    <div class="btn-wrapper">
        <button id="praiseBtn">褒めて！</button>
    </div>

    <div id="controls">
        <button id="resetBtn" title="カウントリセット">🔄</button>
        <button id="soundToggle" title="サウンドON/OFF">🔊</button>
    </div>

    <!-- メインロジックを別ファイルから読み込み -->
    <script src="script.js"></script>
</body>
</html>
