<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>褒め殺しカウンター</title>
    <!-- 紙吹雪を降らせるライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.1s;
        }

        /* 画面シェイクエフェクト */
        .shake {
            animation: shake 0.15s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-3px, 3px, 0) rotate(-1deg); }
            20%, 80% { transform: translate3d(5px, -3px, 0) rotate(2deg); }
            30%, 50%, 70% { transform: translate3d(-8px, 5px, 0) rotate(-2deg); }
            40%, 60% { transform: translate3d(8px, -5px, 0) rotate(1deg); }
        }

        /* カウンター表示 */
        #counter {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            z-index: 10;
        }

        /* コンボ表示 */
        .combo-text {
            font-size: 2rem;
            color: #ffcc00;
            margin-bottom: 30px;
            height: 40px;
            font-weight: 900;
            text-shadow: 0 0 10px #ff0000;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 巨大ボタン */
        .btn-wrapper {
            position: relative;
            z-index: 10;
        }

        button#praiseBtn {
            font-size: 2.5rem;
            font-weight: 900;
            padding: 30px 60px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            color: white;
            cursor: pointer;
            outline: none;
            box-shadow: 0 15px 0 #b3002b, 0 20px 20px rgba(0,0,0,0.4);
            transition: transform 0.05s, box-shadow 0.05s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        button#praiseBtn:active, button#praiseBtn.active {
            transform: translateY(15px);
            box-shadow: 0 0 0 #b3002b, 0 5px 10px rgba(0,0,0,0.4);
        }

        /* 飛び出す褒め言葉テキスト */
        .popup-text {
            position: absolute;
            font-size: 3rem;
            font-weight: 900;
            pointer-events: none;
            white-space: nowrap;
            animation: popupAnim 1s ease-out forwards;
            z-index: 5;
            /* 派手な縁取り */
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        }

        @keyframes popupAnim {
            0% { transform: scale(0.5) translateY(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) translateY(-80px) rotate(calc(var(--rot) * 1deg)); opacity: 1; }
            100% { transform: scale(2) translateY(-150px) rotate(calc(var(--rot) * 2deg)); opacity: 0; }
        }

        /* フィーバー時の背景ピカピカ */
        .fever {
            animation: feverBg 0.1s infinite alternate;
        }

        @keyframes feverBg {
            0% { background-color: #1a1a2e; }
            100% { background-color: #e94560; }
        }

        /* コントロール群 */
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
        }

        #controls button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: background 0.2s;
            margin-left: 10px;
        }

        #controls button:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="combo-text" id="comboText"></div>
    <div id="counter">0 回 褒められた！</div>
    
    <div class="btn-wrapper">
        <button id="praiseBtn">褒めて！</button>
    </div>

    <div id="controls">
        <button id="resetBtn" title="カウントリセット">🔄</button>
        <button id="soundToggle" title="サウンドON/OFF">🔊</button>
    </div>

    <script>
        const btn = document.getElementById('praiseBtn');
        const counterEl = document.getElementById('counter');
        const comboEl = document.getElementById('comboText');
        const body = document.body;
        const soundToggle = document.getElementById('soundToggle');
        const resetBtn = document.getElementById('resetBtn');

        // ローカルストレージから累計カウントを取得（なければ0）
        let count = parseInt(localStorage.getItem('praiseCount')) || 0;
        let soundEnabled = true;
        let combo = 0;
        let comboTimer = null;
        let audioCtx;

        // 初期表示
        counterEl.innerText = `${count} 回 褒められた！`;

        // 褒め言葉のバリエーション
        const praiseWords = [
            "天才！", "人類の至宝！", "生きてるだけで偉い！", "神！", "ノーベル賞確定！",
            "圧倒的成長！", "最高！", "素晴らしい！", "国宝級！", "大天才！",
            "宇宙の覇者！", "奇跡の存在！", "ブラボー！", "拍手喝采！", "ビッグバン級！"
        ];

        // 派手なカラーパレット
        const colors = ['#FF1493', '#00FF00', '#00BFFF', '#FFD700', '#FF4500', '#00FA9A', '#FFFFFF'];

        // オーディオコンテキストの初期化（初回タップ時に発火させる）
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // ピコピコ音の生成（コンボに応じて音階が上昇）
        function playSound(pitchMultiplier = 1) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // 基準となる周波数（ラドミファ...的なゲーム音風）
            const baseFreq = 440; 
            osc.frequency.setValueAtTime(baseFreq * pitchMultiplier, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * pitchMultiplier * 1.5, audioCtx.currentTime + 0.1);
            
            osc.type = 'sine'; // 耳に優しいサイン波
            
            // 音量のエンベロープ（減衰）
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // サウンドON/OFFトグル
        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundToggle.innerText = soundEnabled ? '🔊' : '🔇';
            initAudio();
        });

        // リセット機能
        resetBtn.addEventListener('click', () => {
            if (confirm('本当に褒められた回数をリセットしますか？')) {
                count = 0;
                localStorage.setItem('praiseCount', count);
                counterEl.innerText = `${count} 回 褒められた！`;
                combo = 0;
            }
        });

        // テキストをランダムな位置にポップアップさせる
        function createPopupText() {
            const el = document.createElement('div');
            el.className = 'popup-text';
            el.innerText = praiseWords[Math.floor(Math.random() * praiseWords.length)];
            
            // ボタン周り（画面中央）を避けてランダムな座標を生成
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            let x, y;
            let overlapping = true;
            
            while (overlapping) {
                // 画面の幅・高さに収まるようにランダム設定 (テキストの幅を考慮して右寄りを避ける)
                x = 50 + Math.random() * (window.innerWidth - 300);
                y = 150 + Math.random() * (window.innerHeight - 250);
                
                // ボタン領域(中央の 幅±250px、高さ±150px) を避ける
                if (Math.abs(x - centerX) > 250 || Math.abs(y - centerY) > 150) {
                    overlapping = false;
                }
            }
            
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            // CSS変数にランダムな角度を渡して回転させる
            const rot = (Math.random() - 0.5) * 80;
            el.style.setProperty('--rot', rot);
            
            body.appendChild(el);
            
            // アニメーション終了後にDOMから削除（軽量化）
            setTimeout(() => {
                el.remove();
            }, 1000);
        }

        // 紙吹雪エフェクト (canvas-confetti)
        function triggerConfetti() {
            confetti({
                particleCount: Math.min(50 + combo * 5, 300), // コンボで増える
                spread: 70 + Math.min(combo * 5, 100),
                origin: { y: 0.8 },
                colors: [colors[Math.floor(Math.random() * colors.length)], '#ffffff'],
                zIndex: 1
            });
        }

        // コンボ計算・フィーバー判定
        function updateCombo() {
            combo++;
            clearTimeout(comboTimer);
            
            if (combo > 1) {
                comboEl.innerText = `${combo} COMBO!!`;
                // コンボ数に応じてコンボ表示を少し大きくする
                comboEl.style.transform = `scale(${Math.min(1 + combo * 0.05, 1.8)})`;
            }

            // キリ番（50回毎）でフィーバー演出
            if (combo > 0 && combo % 50 === 0) {
                body.classList.add('fever');
                setTimeout(() => body.classList.remove('fever'), 1000);
                
                // 大規模な紙吹雪
                confetti({
                    particleCount: 500,
                    spread: 200,
                    startVelocity: 60,
                    origin: { y: 0.5 },
                    zIndex: 100
                });
            }

            // 1秒放置でコンボリセット
            comboTimer = setTimeout(() => {
                combo = 0;
                comboEl.innerText = '';
            }, 1000); 
        }

        // ピッチ（音程）をコンボ数から計算
        function getPitch() {
            // 最大で元の2.5倍の高さまで登り詰める
            return 1 + Math.min(combo * 0.05, 1.5);
        }

        // メイン処理（ボタン押下時）
        function handleClick(e) {
            initAudio(); // 音声再生の事前準備
            
            count++;
            localStorage.setItem('praiseCount', count);
            counterEl.innerText = `${count} 回 褒められた！`;
            
            updateCombo();
            playSound(getPitch());
            triggerConfetti();
            
            // バイブレーションAPI (スマホの触覚フィードバック用)
            if (navigator.vibrate) {
                navigator.vibrate(30); 
            }

            // 画面を揺らす（一度クラスを外してリフローし、再度付与）
            body.classList.remove('shake');
            void body.offsetWidth; 
            body.classList.add('shake');

            // 中央のボタン領域を避けてテキストを出現させる
            createPopupText();
        }

        // スマホでの体験を上げるため mousedown と touchstart 両対応
        // ※touchstartはレスポンスが極めて速い
        btn.addEventListener('mousedown', handleClick);
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // ダブルクリックや余分なイベントの発火を防ぐ
            btn.classList.add('active'); // CSSの凹みエフェクトを手動適用
            handleClick(e);
        }, {passive: false});

        btn.addEventListener('touchend', () => {
            btn.classList.remove('active');
        });
        
        // iOS等での無駄なズーム動作を防止
        document.addEventListener('dblclick', function(event) {
            event.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
